services:

  #  Kafka Infra
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network

  #  API Gateway
  api-gateway:
    build: ./backend/api-gateway
    container_name: api-gateway
    env_file:
      - ./backend/api-gateway/.env
    ports:
      - "5000:5000"
    depends_on:
      - kafka
      - user-service
    restart: always
    networks:
      - app-network

  #  User Service
  user-service:
    build: ./backend/user-service
    container_name: user-service
    env_file:
      - ./backend/user-service/.env
    ports:
      - "5001:5001"
    restart: always
    networks:
      - app-network

  #  Cart Service
  cart-service:
    build: ./backend/cart-service
    container_name: cart-service
    env_file:
      - ./backend/cart-service/.env
    ports:
      - "5002:5002"
    restart: always
    networks:
      - app-network

  #  Item Service
  item-service:
    build: ./backend/item-service
    container_name: item-service
    env_file:
      - ./backend/items-service/.env
    ports:
      - "5003:5003"
    restart: always
    networks:
      - app-network

  #  Payment Service
  payment-service:
    build: ./backend/payment-service
    container_name: payment-service
    env_file:
      - ./backend/payment-service/.env
    ports:
      - "5004:5004"
    restart: always
    depends_on:
      - kafka
    networks:
      - app-network

  #  Notification Service
  notification-service:
    build: ./backend/notification-service
    container_name: notification-service
    env_file:
      - ./backend/notification-service/.env
    ports:
      - "5005:5005"
    restart: always
    depends_on:
      - kafka
    networks:
      - app-network

  #  Order Service
  order-service:
    build: ./backend/order-service
    container_name: order-service
    env_file:
      - ./backend/order-service/.env
    ports:
      - "5006:5006"
    restart: always
    depends_on:
      - kafka
    networks:
      - app-network

  #  Frontend
  frontend:
    build: ./frontend
    container_name: frontend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
    restart: always
    networks:
      - app-network

networks:
  app-network:
    driver: bridge